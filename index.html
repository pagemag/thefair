<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Ticket Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎫 CRM Ticket Challenge</h1>
            <p>Test your problem-solving skills by resolving customer tickets</p>
        </header>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-card">
                    <h3>Score</h3>
                    <span id="score">0</span>
                </div>
                <div class="stat-card">
                    <h3>Solved</h3>
                    <span id="solved">0</span>
                </div>
                <div class="stat-card">
                    <h3>Total</h3>
                    <span id="total">12</span>
                </div>
            </div>

            <div class="priority-filter">
                <button class="filter-btn active" data-priority="all">All Tickets</button>
                <button class="filter-btn p1" data-priority="P1">P1 - Critical</button>
                <button class="filter-btn p2" data-priority="P2">P2 - High</button>
                <button class="filter-btn p3" data-priority="P3">P3 - Medium</button>
                <button class="filter-btn p4" data-priority="P4">P4 - Low</button>
            </div>

            <div id="ticketContainer" class="ticket-container">
                <!-- Tickets will be dynamically generated here -->
            </div>

            <div class="results" id="results" style="display: none;">
                <h2>Challenge Complete! 🎉</h2>
                <p>Your final score: <span id="finalScore"></span>/12</p>
                <button onclick="resetChallenge()" class="reset-btn">Try Again</button>
            </div>
        </div>
    </div>

    <!-- Modal for ticket details -->
    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody">
                <!-- Modal content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
